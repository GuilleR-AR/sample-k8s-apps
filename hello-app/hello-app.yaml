apiVersion: v1
kind: Namespace
metadata:
  name: hello-app
  labels:
    name: hello-app
    
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
  namespace: hello-app
spec:
  replicas: 3
  selector:
    matchLabels:
      role: hello-app
  template:
    metadata:
      labels:
        role: hello-app
    spec:
      containers:
      - name: hello-app
        image: gcr.io/google-samples/hello-app:1.0
        ports:
        - containerPort: 8080

---

apiVersion: v1
kind: Service
metadata:
  name: hello-lb
  namespace: hello-app

#  annotations:
#    metallb.universe.tf/address-pool: default-address-pool
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  selector:
    role: hello-app
